<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fleet Upgrades — Galaxy Conquest</title>
    <link rel="stylesheet" href="css/menu-style.css">
    <link rel="stylesheet" href="css/cyberpunk-theme.css">
</head>
<body class="theme-dark-neon view-upgrades">
    <div class="page-shell">
        <header class="page-header">
            <a class="menu-back" id="upgradesBackBtn" href="menu.html">← Back</a>
            <h1>Fleet Upgrades</h1>
        </header>

        <main class="page-main">
            <section class="upgrade-screen">
                <h2 class="screen-title">FLEET UPGRADES</h2>
                <div class="screen-header">
                    <div class="currency-display">
                        Credits: <span id="menuCurrency">0</span>
                    </div>
                </div>
                <div class="upgrades-container" id="upgradesContainer"></div>
                <div style="margin-top:18px;text-align:center;">
                    <a class="menu-btn" href="menu.html" id="upgradesBackBtnFooter">Back to Command Center</a>
                </div>
            </section>
        </main>
    </div>

    <script src="js/asset-fallbacks.js"></script>
    <script src="js/save-system.js"></script>
    <script src="js/character-system.js"></script>
    <script src="js/upgrade-system.js"></script>
    <script src="js/menu.js"></script>
    <script>
        // When loaded as a standalone page we still want to run the upgrade UI builder
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // MenuSystem will initialize and build the upgrade UI
                const menu = new MenuSystem();
                // Ensure back buttons go back to the menu
                document.getElementById('upgradesBackBtn')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'menu.html'; });
                document.getElementById('upgradesBackBtnFooter')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'menu.html'; });
            } catch (e) { console.warn('Standalone upgrades init failed', e); }
        });
    </script>
</body>
</html>
